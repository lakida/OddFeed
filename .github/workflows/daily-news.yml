name: OddFeed — Notizie del giorno

# ──────────────────────────────────────────────────────────────────────────────
# Genera le notizie quotidiane di OddFeed e invia le notifiche push.
#
# Tre esecuzioni giornaliere:
#   07:30 CEST (05:30 UTC) — Colazione: genera notizie + notifiche mattina
#   13:00 CEST (11:00 UTC) — Pranzo: notifiche solo per utenti slot Pranzo + Premium
#   20:00 CEST (18:00 UTC) — Cena: notifiche per slot Pomeriggio/Cena + Premium
#
# Si può anche avviare manualmente dal tab "Actions" su GitHub.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 05:30 UTC = 07:30 CEST — fascia Colazione (genera articoli + notifica mattina)
    - cron: '30 5 * * *'
    # 11:00 UTC = 13:00 CEST — fascia Pranzo (solo notifiche)
    - cron: '0 11 * * *'
    # 18:00 UTC = 20:00 CEST — fascia Cena (solo notifiche)
    - cron: '0 18 * * *'

  # Avvio manuale: utile per testare o per rigenerare le notizie di un giorno
  workflow_dispatch:
    inputs:
      force:
        description: 'Sovrascrivi le notizie già esistenti (--force)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      date:
        description: 'Data da rigenerare in formato YYYY-MM-DD (vuoto = oggi)'
        required: false
        default: ''
      slot:
        description: 'Fascia notifiche (morning/lunch/evening). Vuoto = morning.'
        required: false
        default: 'morning'
        type: choice
        options:
          - 'morning'
          - 'lunch'
          - 'evening'
      notify_only:
        description: 'Solo notifiche, senza rigenerare gli articoli'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # ── Job mattina: genera articoli + notifiche Colazione ──────────────────────
  morning-news:
    name: Genera notizie + Notifiche Colazione
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 5 * * *'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installa dipendenze
        working-directory: scripts
        run: npm install

      - name: Genera notizie del giorno
        working-directory: scripts
        env:
          GUARDIAN_KEY: ${{ secrets.GUARDIAN_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          ARGS="--slot=morning"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date=${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.notify_only }}" = "true" ]; then
            ARGS="$ARGS --notify-only"
          fi
          if [ -n "${{ github.event.inputs.slot }}" ] && [ "${{ github.event.inputs.slot }}" != "morning" ]; then
            ARGS="--slot=${{ github.event.inputs.slot }} --notify-only"
          fi
          node fetch-news.js $ARGS

      - name: Notifica fallimento
        if: failure()
        run: |
          echo "::error::Generazione notizie mattina fallita. Controlla i log."
          echo "Il workflow ha fallito il $(date '+%Y-%m-%d') alle $(date '+%H:%M') UTC"

  # ── Job pranzo: notifiche fascia Pranzo ─────────────────────────────────────
  lunch-notifications:
    name: Notifiche Pranzo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.schedule == '0 11 * * *'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installa dipendenze
        working-directory: scripts
        run: npm install

      - name: Invia notifiche pranzo
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node send-notifications.js lunch

      - name: Notifica fallimento
        if: failure()
        run: echo "::error::Notifiche pranzo fallite."

  # ── Job cena: notifiche fascia Cena/Pomeriggio ──────────────────────────────
  evening-notifications:
    name: Notifiche Cena
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.schedule == '0 18 * * *'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installa dipendenze
        working-directory: scripts
        run: npm install

      - name: Invia notifiche cena
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node send-notifications.js evening

      - name: Notifica fallimento
        if: failure()
        run: echo "::error::Notifiche cena fallite."
